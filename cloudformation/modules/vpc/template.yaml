AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC module. Creates VPC, public/private/database subnets, IGW, NAT gateway(s),
  route tables, and optional VPC Flow Logs.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network
        Parameters:
          - Name
          - VpcCidr
          - AvailabilityZones
          - PublicSubnetCidrs
          - PrivateSubnetCidrs
          - DatabaseSubnetCidrs
          - NumberOfAzs
      - Label:
          default: NAT Gateway
        Parameters:
          - CreateNatGateway
          - SingleNatGateway
          - OneNatGatewayPerAz
      - Label:
          default: DNS & Flow Logs
        Parameters:
          - EnableDnsHostnames
          - EnableDnsSupport
          - EnableFlowLogs
          - FlowLogRetentionDays
      - Label:
          default: Tags
        Parameters:
          - Environment
          - Project
          - Owner

Parameters:
  Name:
    Type: String
    Description: Name prefix for all VPC resources

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-8]))$'
    Description: CIDR block for the VPC

  AvailabilityZones:
    Type: CommaDelimitedList
    Description: List of AZs (e.g. us-east-1a,us-east-1b,us-east-1c)

  PublicSubnetCidrs:
    Type: CommaDelimitedList
    Description: CIDR blocks for public subnets (one per AZ)

  PrivateSubnetCidrs:
    Type: CommaDelimitedList
    Description: CIDR blocks for private subnets (one per AZ)

  DatabaseSubnetCidrs:
    Type: CommaDelimitedList
    Default: ''
    Description: Optional CIDR blocks for database subnets (leave empty to skip)

  NumberOfAzs:
    Type: Number
    Default: 2
    AllowedValues: [2, 3]
    Description: Number of AZs — must match the length of subnet CIDR lists

  CreateNatGateway:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable NAT Gateway for private subnet egress (enable_nat_gateway)

  SingleNatGateway:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Use a single NAT Gateway for all private subnets (single_nat_gateway)

  OneNatGatewayPerAz:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: One NAT Gateway per AZ (one_nat_gateway_per_az)

  EnableDnsHostnames:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableDnsSupport:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableFlowLogs:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable VPC Flow Logs to CloudWatch

  FlowLogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

  Environment:
    Type: String
    AllowedPattern: '^[a-z0-9-]+$'

  Project:
    Type: String
    AllowedPattern: '^[a-z0-9-]+$'

  Owner:
    Type: String
    Default: platform-team

Conditions:
  CreateNat: !Equals [!Ref CreateNatGateway, 'true']
  SingleNat: !And
    - !Condition CreateNat
    - !Equals [!Ref SingleNatGateway, 'true']
  NatPerAz: !And
    - !Condition CreateNat
    - !Not [!Condition SingleNat]
    - !Equals [!Ref OneNatGatewayPerAz, 'true']
  NatNotSingle: !And
    - !Condition CreateNat
    - !Not [!Condition SingleNat]
  CreateDatabaseSubnets: !Not [!Equals [!Join ['', !Ref DatabaseSubnetCidrs], '']]
  EnableFlowLogsCondition: !Equals [!Ref EnableFlowLogs, 'true']
  DnsHostnames: !Equals [!Ref EnableDnsHostnames, 'true']
  DnsSupport: !Equals [!Ref EnableDnsSupport, 'true']
  HasThirdAz: !Equals [!Ref NumberOfAzs, 3]
  HasThirdPublic: !Equals [!Ref NumberOfAzs, 3]
  HasThirdPrivate: !Equals [!Ref NumberOfAzs, 3]
  HasThirdDatabase: !And
    - !Condition CreateDatabaseSubnets
    - !Equals [!Ref NumberOfAzs, 3]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: !If [DnsHostnames, true, false]
      EnableDnsSupport: !If [DnsSupport, true, false]
      Tags:
        - Key: Name
          Value: !Sub '${Name}-vpc'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Module
          Value: vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${Name}-igw'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # --- Public Subnets ---
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      CidrBlock: !Select [0, !Ref PublicSubnetCidrs]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-public-'
              - !Select [0, !Ref AvailabilityZones]
        - Key: Tier
          Value: public
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      CidrBlock: !Select [1, !Ref PublicSubnetCidrs]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-public-'
              - !Select [1, !Ref AvailabilityZones]
        - Key: Tier
          Value: public
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Condition: HasThirdPublic
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !Ref AvailabilityZones]
      CidrBlock: !Select [2, !Ref PublicSubnetCidrs]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-public-'
              - !Select [2, !Ref AvailabilityZones]
        - Key: Tier
          Value: public

  # --- Private Subnets ---
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      CidrBlock: !Select [0, !Ref PrivateSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-private-'
              - !Select [0, !Ref AvailabilityZones]
        - Key: Tier
          Value: private
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      CidrBlock: !Select [1, !Ref PrivateSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-private-'
              - !Select [1, !Ref AvailabilityZones]
        - Key: Tier
          Value: private
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Condition: HasThirdPrivate
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !Ref AvailabilityZones]
      CidrBlock: !Select [2, !Ref PrivateSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-private-'
              - !Select [2, !Ref AvailabilityZones]
        - Key: Tier
          Value: private

  # --- Database Subnets ---
  DatabaseSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateDatabaseSubnets
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      CidrBlock: !Select [0, !Ref DatabaseSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-database-'
              - !Select [0, !Ref AvailabilityZones]
        - Key: Tier
          Value: database

  DatabaseSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateDatabaseSubnets
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      CidrBlock: !Select [1, !Ref DatabaseSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-database-'
              - !Select [1, !Ref AvailabilityZones]
        - Key: Tier
          Value: database

  DatabaseSubnet3:
    Type: AWS::EC2::Subnet
    Condition: HasThirdDatabase
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [2, !Ref AvailabilityZones]
      CidrBlock: !Select [2, !Ref DatabaseSubnetCidrs]
      Tags:
        - Key: Name
          Value: !Join
            - ''
            - - !Sub '${Name}-database-'
              - !Select [2, !Ref AvailabilityZones]
        - Key: Tier
          Value: database

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: CreateDatabaseSubnets
    Properties:
      DBSubnetGroupDescription: !Sub '${Name} database subnet group'
      SubnetIds: !If
        - HasThirdDatabase
        - [!Ref DatabaseSubnet1, !Ref DatabaseSubnet2, !Ref DatabaseSubnet3]
        - [!Ref DatabaseSubnet1, !Ref DatabaseSubnet2]
      Tags:
        - Key: Name
          Value: !Sub '${Name}-db-subnet-group'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  # --- NAT Gateways ---
  NatEip1:
    Type: AWS::EC2::EIP
    Condition: CreateNat
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-eip-1'

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Condition: CreateNat
    Properties:
      AllocationId: !GetAtt NatEip1.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-1'

  NatEip2:
    Type: AWS::EC2::EIP
    Condition: NatNotSingle
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-eip-2'

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Condition: NatNotSingle
    Properties:
      AllocationId: !GetAtt NatEip2.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-2'

  NatEip3:
    Type: AWS::EC2::EIP
    Condition: NatPerAz
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-eip-3'

  NatGateway3:
    Type: AWS::EC2::NatGateway
    Condition: NatPerAz
    Properties:
      AllocationId: !GetAtt NatEip3.AllocationId
      SubnetId: !Ref PublicSubnet3
      Tags:
        - Key: Name
          Value: !Sub '${Name}-nat-3'

  # --- Route Tables ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-public-rt'
        - Key: Environment
          Value: !Ref Environment

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasThirdPublic
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-private-rt-1'

  PrivateRoute1:
    Type: AWS::EC2::Route
    Condition: CreateNat
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Condition: NatNotSingle
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-private-rt-2'

  PrivateRoute2:
    Type: AWS::EC2::Route
    Condition: NatNotSingle
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [NatPerAz, !Ref NatGateway2, !Ref NatGateway1]

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !If [NatNotSingle, !Ref PrivateRouteTable2, !Ref PrivateRouteTable1]

  PrivateRouteTable3:
    Type: AWS::EC2::RouteTable
    Condition: HasThirdPrivate
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${Name}-private-rt-3'

  PrivateRoute3:
    Type: AWS::EC2::Route
    Condition: NatPerAz
    Properties:
      RouteTableId: !Ref PrivateRouteTable3
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway3

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: HasThirdPrivate
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !If [NatPerAz, !Ref PrivateRouteTable3, !Ref PrivateRouteTable1]

  # --- VPC Flow Logs ---
  FlowLogRole:
    Type: AWS::IAM::Role
    Condition: EnableFlowLogsCondition
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: flow-log-delivery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnableFlowLogsCondition
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/vpc/${Name}-flow-logs'
      RetentionInDays: !Ref FlowLogRetentionDays

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: EnableFlowLogsCondition
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogGroupName: !Ref FlowLogGroup
      ResourceId: !Ref Vpc
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${Name}-flow-log'

Outputs:
  VpcId:
    Description: ID of the VPC
    Value: !Ref Vpc

  VpcCidrBlock:
    Description: CIDR block of the VPC
    Value: !Ref VpcCidr

  PublicSubnetIds:
    Description: Comma-separated public subnet IDs
    Value: !If
      - HasThirdPublic
      - !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]
      - !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]

  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs
    Value: !If
      - HasThirdPrivate
      - !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]]
      - !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]

  DatabaseSubnetGroupName:
    Condition: CreateDatabaseSubnets
    Description: RDS DB subnet group name
    Value: !Ref DatabaseSubnetGroup

  NatGatewayIds:
    Condition: CreateNat
    Description: NAT Gateway IDs
    Value: !If
      - NatPerAz
      - !Join [',', [!Ref NatGateway1, !Ref NatGateway2, !Ref NatGateway3]]
      - !If
        - SingleNat
        - !Ref NatGateway1
        - !Join [',', [!Ref NatGateway1, !Ref NatGateway2]]

  AvailabilityZones:
    Description: AZs used by this VPC
    Value: !Join [',', !Ref AvailabilityZones]
