AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Application Load Balancer module. Creates ALB, HTTPS listener, target group, and optional WAF association.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Load Balancer
        Parameters:
          - Name
          - Scheme
          - SubnetIds
          - SecurityGroupIds
      - Label:
          default: Target Group
        Parameters:
          - VpcId
          - TargetPort
          - HealthCheckPath
      - Label:
          default: TLS
        Parameters:
          - CertificateArn
          - EnableHttpsRedirect
      - Label:
          default: Tags
        Parameters:
          - Environment
          - Project
          - Owner

Parameters:
  Name:
    Type: String
    Description: ALB name prefix

  Scheme:
    Type: String
    Default: internal
    AllowedValues: [internal, internet-facing]

  SubnetIds:
    Type: String
    Description: Comma-separated subnet IDs (String for nested stack compatibility)

  SecurityGroupIds:
    Type: String
    Description: Comma-separated security group IDs

  VpcId:
    Type: AWS::EC2::VPC::Id

  TargetPort:
    Type: Number
    Default: 8080

  HealthCheckPath:
    Type: String
    Default: /health

  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for HTTPS listener

  EnableHttpsRedirect:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnableDeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  Environment:
    Type: String

  Project:
    Type: String

  Owner:
    Type: String
    Default: platform-team

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  HttpsRedirect: !And
    - !Condition HasCertificate
    - !Equals [!Ref EnableHttpsRedirect, 'true']
  DeletionProtection: !Equals [!Ref EnableDeletionProtection, 'true']

Resources:
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Name}-alb'
      Scheme: !Ref Scheme
      Type: application
      Subnets: !Split [',', !Ref SubnetIds]
      SecurityGroups: !Split [',', !Ref SecurityGroupIds]
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: !If [DeletionProtection, 'true', 'false']
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: access_logs.s3.enabled
          Value: 'false'
      Tags:
        - Key: Name
          Value: !Sub '${Name}-alb'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Module
          Value: alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Name}-tg'
      Port: !Ref TargetPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200-399'
      Tags:
        - Key: Name
          Value: !Sub '${Name}-tg'
        - Key: Environment
          Value: !Ref Environment

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions: !If
        - HttpsRedirect
        - - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
        - - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  LoadBalancerArn:
    Description: ALB ARN
    Value: !Ref LoadBalancer

  LoadBalancerDnsName:
    Description: ALB DNS name
    Value: !GetAtt LoadBalancer.DNSName

  TargetGroupArn:
    Description: Target group ARN for ECS service attachment
    Value: !Ref TargetGroup

  HttpsListenerArn:
    Condition: HasCertificate
    Description: HTTPS listener ARN
    Value: !Ref HttpsListener
