AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 bucket module. Production defaults: encryption, versioning, public access block, lifecycle.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Bucket
        Parameters:
          - BucketName
          - ForceDestroy
          - EnableVersioning
      - Label:
          default: Security
        Parameters:
          - BlockPublicAccess
          - EnableDenyInsecureTransport
          - KmsKeyArn
      - Label:
          default: Lifecycle
        Parameters:
          - EnableLifecycleTransition
          - TransitionToIADays
          - ExpirationDays
      - Label:
          default: Tags
        Parameters:
          - Environment
          - Project
          - Owner

Parameters:
  BucketName:
    Type: String
    Description: Globally unique bucket name
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name (3-63 chars, lowercase)

  ForceDestroy:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Delete all objects on stack destroy (non-prod only)

  EnableVersioning:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  BlockPublicAccess:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Block all public access (recommended for production)

  EnableDenyInsecureTransport:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Deny non-HTTPS requests via bucket policy

  KmsKeyArn:
    Type: String
    Default: ''
    Description: Optional KMS key ARN for SSE-KMS (empty = SSE-S3 AES256)

  EnableLifecycleTransition:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

  TransitionToIADays:
    Type: Number
    Default: 90

  ExpirationDays:
    Type: Number
    Default: 0
    Description: Days until object expiration (0 = disabled)

  Environment:
    Type: String

  Project:
    Type: String

  Owner:
    Type: String
    Default: platform-team

Conditions:
  UseKms: !Not [!Equals [!Ref KmsKeyArn, '']]
  VersioningEnabled: !Equals [!Ref EnableVersioning, 'true']
  BlockPublic: !Equals [!Ref BlockPublicAccess, 'true']
  DenyInsecure: !Equals [!Ref EnableDenyInsecureTransport, 'true']
  LifecycleEnabled: !Equals [!Ref EnableLifecycleTransition, 'true']
  HasExpiration: !Not [!Equals [!Ref ExpirationDays, 0]]

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: !If [UseKms, 'aws:kms', 'AES256']
              KMSMasterKeyID: !If [UseKms, !Ref KmsKeyArn, !Ref AWS::NoValue]
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: !If [VersioningEnabled, Enabled, Suspended]
      PublicAccessBlockConfiguration: !If
        - BlockPublic
        - BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        - !Ref AWS::NoValue
      LifecycleConfiguration: !If
        - LifecycleEnabled
        - Rules:
            - Id: transition-to-ia
              Status: Enabled
              Transitions:
                - StorageClass: STANDARD_IA
                  TransitionInDays: !Ref TransitionToIADays
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Module
          Value: s3-bucket

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: DenyInsecure
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt Bucket.Arn
              - !Sub '${Bucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

Outputs:
  BucketName:
    Description: S3 bucket name
    Value: !Ref Bucket

  BucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt Bucket.Arn

  BucketDomainName:
    Description: Regional domain name
    Value: !GetAtt Bucket.RegionalDomainName
